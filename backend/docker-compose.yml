version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: url-shortener-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: url-shortener-redis

    restart: always

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      target: development
    container_name: url-shortener-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ".env.development"
    
    volumes:
    - .:/app
    - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
